<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Responsive Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <img src="https://picsum.photos/id/1015/600/400" class="gallery-img nature">
        <img src="https://picsum.photos/id/1011/600/400" class="gallery-img nature">
        <img src="https://picsum.photos/id/1012/600/400" class="gallery-img city">
        <img src="https://picsum.photos/id/1016/600/400" class="gallery-img city">
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <button class="prev">&#10094;</button>
        <img class="lightbox-img">
        <button class="next">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
